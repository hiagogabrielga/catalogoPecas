<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Materiais</title>
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Catálogo de peças" />
    <meta
      name="twitter:description"
      content="Veja nosso catálogo completo de peças"
    />
    <meta
      name="twitter:image"
      content="https://catalogo-pecas.vercel.app/logo.png"
    />
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
      body {
        font-family: "Segoe UI", Arial;
        background: #eef2f7;
        margin: 0;
      }
      header {
        display: flex;
        align-items: center;
        background: #222f41;
        color: white;
        padding: 15px 25px;
      }
      .headerName {
        font-size: 26px;
        margin-left: 10px;
      }
      .search-box {
        padding: 15px 20px;
        background: #f9fafb;
        border-bottom: 1px solid #ddd;
      }
      .search-box input {
        width: 80%;
        padding: 10px 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        outline: none;
      }
      .container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        padding: 20px;
      }
      .card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        padding: 15px;
        transition: 0.2s;
      }
      .card:hover {
        transform: translateY(-5px);
      }
      .card img {
        width: 100%;
        height: 140px;
        object-fit: contain;
        margin-bottom: 10px;
      }
      .codigo {
        font-weight: bold;
        color: #111827;
        margin-bottom: 5px;
      }
      .nome {
        font-size: 14px;
        color: #374151;
        margin-bottom: 8px;
      }
      .info {
        font-size: 13px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="./amaggi.png" alt="Logo Amaggi" />
      <span class="headerName">Catálogo de peças</span>
    </header>

    <div class="search-box">
      <input
        type="text"
        id="search"
        placeholder="🔍 Buscar por código ou nome..."
        oninput="filtrarDebounced()"
      />
    </div>

    <div class="container" id="cards"></div>

    <script>
      let listaCompleta = [];
      let debounceTimer;

      async function lerExcel(caminho) {
        const response = await fetch(caminho);
        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        return XLSX.utils.sheet_to_json(sheet);
      }

      async function imagemExiste(url) {
        try {
          const response = await fetch(url, { method: "HEAD" });
          if (response.ok) return true;
        } catch (e) {}

        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => resolve(true);
          img.onerror = () => resolve(false);
          img.src = url;
        });
      }

      async function encontrarImagem(codigo) {
        const extensoes = ["png", "jpg", "jpeg", "gif"];
        for (let ext of extensoes) {
          const caminho = `imagens/${codigo}.${ext}`;
          const existe = await imagemExiste(caminho);
          if (existe) return caminho;
        }
        return null; // nenhuma imagem encontrada
      }

      async function carregarDados() {
        try {
          // Primeiro tenta pegar do localStorage
          const dadosSalvos = localStorage.getItem("catalogoPecas");
          if (dadosSalvos) {
            listaCompleta = JSON.parse(dadosSalvos);
            renderizar(listaCompleta);
            console.log("Dados carregados do localStorage");
            return;
          }

          // Se não tiver no localStorage, lê do Excel
          const materiais = await lerExcel("dados/nomes_usuais.xlsx");
          let cont = 0;

          const candidatos = await Promise.all(
            materiais.map(async (mat) => {
              const cod = String(mat.material);
              const img = await encontrarImagem(cod);
              if (!img) return null;
              cont++;
              return {
                codigo: cod,
                nome: mat.nome,
                imagem: img,
                contagem: cont,
              };
            }),
          );

          listaCompleta = candidatos.filter(Boolean);
          renderizar(listaCompleta);

          // Salva no localStorage para próximas visitas
          localStorage.setItem("catalogoPecas", JSON.stringify(listaCompleta));
          console.log("Dados salvos no localStorage");
        } catch (erro) {
          console.error("Erro ao carregar arquivos:", erro);
        }
      }

      function criarCard(item) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
      <img src="${item.imagem}" loading="lazy">
      <div class="codigo">Código: ${item.codigo}</div>
      <div class="nome">${item.nome}</div>
    `;
        return card;
      }

      function renderizar(lista) {
        const container = document.getElementById("cards");
        const fragment = document.createDocumentFragment();
        lista.forEach((item) => fragment.appendChild(criarCard(item)));
        container.replaceChildren(fragment);
      }

      function filtrarDebounced() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          const termo = document.getElementById("search").value.toLowerCase();
          const filtrados = listaCompleta.filter(
            (item) =>
              item.codigo.includes(termo) ||
              item.nome.toLowerCase().includes(termo),
          );
          renderizar(filtrados);
        }, 200);
      }

      window.onload = carregarDados;
    </script>
  </body>
</html>
