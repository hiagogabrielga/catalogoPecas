<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Materiais</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      background: #eef2f7;
      margin: 0;
    }

    header {
      display: flex;
      align-items: center;
      background: #222f41;
      color: white;
      padding: 15px 25px;
    }

    .headerName {
      font-size: 26px;
      margin-left: 10px;
    }

    .search-box {
      padding: 15px 20px;
      background: #f9fafb;
      border-bottom: 1px solid #ddd;
    }

    .search-box input {
      width: 80%;
      padding: 10px 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 15px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .codigo {
      font-weight: bold;
      color: #111827;
      margin-bottom: 5px;
    }

    .nome {
      font-size: 14px;
      color: #374151;
      margin-bottom: 8px;
    }

    .info {
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>

<header>
  <img src="./amaggi.png" alt="Logo Amaggi">
  <span class="headerName">Catálogo de peças</span>
</header>

<div class="search-box">
  <input 
    type="text" 
    id="search" 
    placeholder="🔍 Buscar por código ou nome..."
    oninput="filtrar()"
  >
</div>

<div class="container" id="cards"></div>

<script>
let listaCompleta = [];

async function lerExcel(caminho) {
  const response = await fetch(caminho);
  const arrayBuffer = await response.arrayBuffer();

  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  return XLSX.utils.sheet_to_json(sheet);
}

async function carregarDados() {
  try {
    const materiais = await lerExcel("dados/nomes_usuais.xlsx");
    const estoque = await lerExcel("dados/pecas_estoque.xlsx");

    await prepararLista(materiais, estoque);
    renderizar(listaCompleta);

  } catch (erro) {
    console.error("Erro ao carregar arquivos:", erro);
  }
}

function imagemExiste(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(true);
    img.onerror = () => resolve(false);
    img.src = src;
  });
}

async function prepararLista(materiais, estoque) {
  listaCompleta = [];

  for (const mat of materiais) {
    const cod = mat.material;
    const est = estoque.find(e => e.material == cod);

    if (!est) continue;

    const imgPath = `imagens/${cod}.png`;
    const existe = await imagemExiste(imgPath);

    if (!existe) continue;

    listaCompleta.push({
      codigo: cod,
      nome: mat.nome,
      quantidade: est.quant,
      unidade: est.unidade,
      imagem: imgPath
    });
  }
}

function renderizar(lista) {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  lista.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.imagem}">
      <div class="codigo">Código: ${item.codigo}</div>
      <div class="nome">${item.nome}</div>
      <div class="info">Qtd: ${item.quantidade}</div>
      <div class="info">Unidade: ${item.unidade}</div>
    `;

    container.appendChild(card);
  });
}

function filtrar() {
  const termo = document.getElementById("search").value.toLowerCase();

  const filtrados = listaCompleta.filter(item =>
    item.codigo.toString().includes(termo) ||
    item.nome.toLowerCase().includes(termo)
  );

  renderizar(filtrados);
}

// 🚀 Auto load
window.onload = carregarDados;
</script>

</body>
</html>
