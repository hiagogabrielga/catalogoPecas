<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Materiais</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      background: #eef2f7;
      margin: 0;
    }

    header {
      background: #222f41;
      color: white;
      padding: 15px 25px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 15px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .codigo {
      font-weight: bold;
      color: #111827;
      margin-bottom: 5px;
    }

    .nome {
      font-size: 14px;
      color: #374151;
      margin-bottom: 8px;
    }

    .info {
      font-size: 13px;
      color: #6b7280;
    }
    .headerName{
      font-size: 26px;
      font-family: 'Segoe UI', Arial;
      margin-left: 10px;
    }
    header{
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>

<header><img src="./amaggi.png" alt="Logo Amaggi"> <span class="headerName">Catálogo de peças</span></header>

<div class="container" id="cards"></div>

<script>
async function lerExcel(caminho) {
  const response = await fetch(caminho);
  const arrayBuffer = await response.arrayBuffer();

  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  return XLSX.utils.sheet_to_json(sheet);
}

async function carregarDados() {
  try {
    const materiais = await lerExcel("dados/nomes_usuais.xlsx");
    const estoque = await lerExcel("dados/pecas_estoque.xlsx");

    montarCards(materiais, estoque);
  } catch (erro) {
    console.error("Erro ao carregar arquivos:", erro);
  }
}

function imagemExiste(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(true);
    img.onerror = () => resolve(false);
    img.src = src;
  });
}

async function montarCards(materiais, estoque) {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  for (const mat of materiais) {
    const cod = mat.material;
    const est = estoque.find(e => e.material == cod);

    if (!est) continue;

    const imgPath = `imagens/${cod}.png`;
    const existe = await imagemExiste(imgPath);

    // 🔥 Se não tiver imagem, ignora
    if (!existe) continue;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${imgPath}">
      <div class="codigo">Código: ${cod}</div>
      <div class="nome">${mat.nome}</div>
      <div class="info">Qtd: ${est.quant}</div>
      <div class="info">Unidade: ${est.unidade}</div>
    `;

    container.appendChild(card);
  }
}

// 🚀 Carrega automaticamente ao abrir
window.onload = carregarDados;
</script>

</body>
</html>
